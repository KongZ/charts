# CI test values for chart-testing (ct install).
# These override defaults to reduce resource usage in GitHub Actions runners.
tags:
  # Both subcharts are pre-installed by the workflow before ct install runs,
  # so they are fully ready when Graylog starts.
  install-mongodb: false
  install-opensearch: false

graylog:
  # Replace G1GC with SerialGC — single-threaded GC, no pthread_create calls.
  # G1GC fails with EPERM in kind's restricted seccomp environment.
  javaOpts: "-Dlog4j2.formatMsgNoLookups=true -Djdk.tls.acknowledgeCloseNotify=true -XX:+UnlockExperimentalVMOptions -XX:-OmitStackTraceInFastThrow -XX:+UseSerialGC -server"
  heapSize: "512m"
  startupProbe:
    periodSeconds: 60
    failureThreshold: 30
    successThreshold: 1
    timeoutSeconds: 5
  mongodb:
    # Point to the MongoDB instance pre-provisioned by the workflow (fixed name: ci-mongodb).
    # The community operator creates service <name>-svc and replicaset named <name>.
    uri: "mongodb://graylog:graylog@ci-mongodb-0.ci-mongodb-svc.ct.svc.cluster.local:27017/graylog?replicaSet=ci-mongodb&authSource=graylog"

mongodb:
  community:
    install: false

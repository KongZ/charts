# CI test values for chart-testing (ct install).
# These override defaults to reduce resource usage in GitHub Actions runners.
tags:
  # Disable MongoDB Community Operator subchart in CI.
  # The operator is pre-installed by the workflow before ct install runs,
  # so it is already ready when the MongoDBCommunity object is created.
  install-mongodb: false

graylog:
  # Replace G1GC with SerialGC — single-threaded GC, no pthread_create calls.
  # G1GC fails with EPERM in kind's restricted seccomp environment.
  javaOpts: "-Dlog4j2.formatMsgNoLookups=true -Djdk.tls.acknowledgeCloseNotify=true -XX:+UnlockExperimentalVMOptions -XX:-OmitStackTraceInFastThrow -XX:+UseSerialGC -server"
  heapSize: "512m"
  # MongoDB agent image pull + replicaset formation takes several minutes in CI.
  # Extend the startup window to match the ct --timeout of 1800s.
  startupProbe:
    periodSeconds: 60
    failureThreshold: 30
    successThreshold: 1
    timeoutSeconds: 5

mongodb:
  community:
    replicas: 1

opensearch:
  replicas: 1
